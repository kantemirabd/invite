<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are Invited - 8 March Celebration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', 'Georgia', serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 50%, #ffd6eb 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating flower decorations */
        .flower {
            position: fixed;
            opacity: 0.3;
            font-size: 3em;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        .flower1 { top: 10%; left: 5%; animation-delay: 0s; }
        .flower2 { top: 20%; right: 8%; animation-delay: 1s; }
        .flower3 { top: 50%; left: 3%; animation-delay: 2s; }
        .flower4 { top: 60%; right: 5%; animation-delay: 1.5s; }
        .flower5 { top: 80%; left: 10%; animation-delay: 0.5s; }
        .flower6 { top: 30%; right: 3%; animation-delay: 2.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ===== LOGIN PAGE ===== */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            animation: fadeIn 0.8s ease;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(230, 75, 138, 0.2);
            border: 2px solid rgba(255, 105, 180, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .login-image {
            width: 100%;
            height: auto;
            margin: -60px -40px 30px -40px;
            border-radius: 30px 30px 0 0;
            display: block;
            object-fit: cover;
            min-height: 250px;
        }

        .login-card h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #e84b8a 0%, #d63384 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .login-card .subtitle {
            font-size: 1.3em;
            color: #d63384;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .login-card p {
            color: #666;
            font-size: 1.05em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .login-input-group {
            margin-bottom: 25px;
        }

        .login-input-group label {
            display: block;
            color: #d63384;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .login-input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255, 105, 180, 0.3);
            border-radius: 15px;
            font-size: 1em;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .login-input-group input:focus {
            outline: none;
            border-color: #ff1493;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.2);
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.4);
        }

        .error-message {
            color: #e74c3c;
            font-size: 1em;
            margin-top: 15px;
            display: none;
        }

        /* ===== GIRL PAGE ===== */
        .girl-page {
            display: none;
            animation: fadeIn 0.8s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #e84b8a 0%, #d63384 50%, #c2185b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.05);
            letter-spacing: 2px;
            font-weight: 700;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-size: 1em;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .back-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
        }

        /* Girl Profile */
        .girl-profile {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            overflow: visible;
            box-shadow: 0 10px 40px rgba(230, 75, 138, 0.15);
            border: 2px solid rgba(255, 105, 180, 0.2);
            backdrop-filter: blur(10px);
            max-width: 800px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease;
        }

        .girl-image {
            width: 100%;
            height: auto;
            min-height: 300px;
            background: linear-gradient(135deg, #ffb6d9 0%, #ffc0cb 50%, #ffb3d9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 5em;
            overflow: visible;
            position: relative;
            margin-bottom: 20px;
            border-radius: 20px 20px 0 0;
        }

        .girl-image img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .girl-image.placeholder {
            background: linear-gradient(135deg, #ffb6d9 0%, #ffc0cb 50%, #ffb3d9 100%);
            font-size: 4em;
            color: rgba(255, 255, 255, 0.8);
        }

        .girl-content {
            padding: 40px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 228, 239, 0.5) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .girl-name {
            font-size: 2.8em;
            background: linear-gradient(135deg, #e84b8a 0%, #d63384 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .girl-description {
            color: #555;
            line-height: 1.9;
            font-size: 1.1em;
            font-family: 'Georgia', serif;
            text-align: center;
        }

        .music-control {
            display: inline-block;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            border: 2px solid #ff1493;
            color: white;
            font-size: 1em;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
            margin-top: 30px;
        }

        .music-control:hover {
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.4);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                padding: 40px 25px;
            }

            .header h1 {
                font-size: 2em;
            }

            .girl-name {
                font-size: 2em;
            }

            .girl-content {
                padding: 25px;
            }
        }

        audio {
            width: 220px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <!-- Floating flower decorations -->
    <div class="flower flower1">🌸</div>
    <div class="flower flower2">💐</div>
    <div class="flower flower3">🌷</div>
    <div class="flower flower4">🌸</div>
    <div class="flower flower5">💐</div>
    <div class="flower flower6">🌷</div>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <img src="https://i.postimg.cc/VvRYzBcb/Whats-App-Image-2026-03-03-at-16-36-06.jpg" alt="Celebration" class="login-image">
            <h1>✨ Welcome ✨</h1>
            <div class="subtitle">8 March Celebration</div>
            <p>Enter your name to access your special invitation</p>
            
            <div class="login-input-group">
                <label for="nameInput">What's your name?</label>
                <input 
                    type="text" 
                    id="nameInput" 
                    placeholder="Enter your name..."
                    onkeypress="handleKeyPress(event)"
                >
            </div>
            
            <button class="login-btn" onclick="checkName()">
                💝 Continue
            </button>
            
            <div class="error-message" id="errorMessage">
                Sorry, you're not on the guest list. Please try again!
            </div>
        </div>
    </div>

    <!-- GIRL PAGE -->
    <div id="girlPage" class="girl-page">
        <div class="container">
            <div style="text-align: center; margin-bottom: 30px;">
                <button class="back-button" onclick="goBack()">← Back</button>
            </div>

            <div class="header">
                <h1>💝 Your Special Invitation 💝</h1>
                <p style="color: #d63384; font-size: 1.2em; margin-top: 10px;">International Women's Day</p>
            </div>

            <div class="girl-profile">
                <div class="girl-image placeholder" id="girlImageContainer">
                    <img id="girlImage" style="display: none;">
                    <span id="girlPlaceholder">👩</span>
                </div>
                <div class="girl-content">
                    <div class="girl-name" id="girlName">Her Name</div>
                    <div class="girl-description" id="girlDescription">
                        Your special message will appear here...
                    </div>
                    
                    <div style="text-align: center;">
                        <audio id="bgMusic" loop>
                            <source src="songs/zen.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Girls data - ADD YOUR GIRLS HERE
        const girls = {
            "Наиля": {
                name: "Наиля",
                description: "Прекрасная Наиля! Твоя доброта, элегантность и теплота делают наш мир ярче. Спасибо за то, что ты рядом с нами. С праздником 8 марта!",
                image: "https://i.postimg.cc/fTFDvb5w/photo-2026-03-04-00-56-03.jpg",
                song: "songs/zen.mp3"
            },
            "Алина": {
                name: "Алина",
                description: "Любимая Алина, я очень сильно тебя люблю ❤️\nВ этот прекрасный день хочу разделить его только с тобой. Оставайся всегда такой же красивой, позитивной и моим самым тёплым солнышком ☀️",
                image: "https://i.postimg.cc/NMxhXsCS/Whats-App-Image-2026-03-04-at-01-45-29.jpg",
                song: "songs/alina.mp3"
            },
            "Айдана": {
                name: "Айдана",
                description: "Дорогая Айдана! Твоё доброе сердце, креативность и позитивная энергия неоценимы. Спасибо, что ты – наша звезда! Счастливого праздника!",
                image: null,
                song: "songs/aidana.mp3"
            },
            "Зарина": {
                name: "Зарина",
                description: "Волшебная Зарина! Твоя сила, грация и верность – вот что делает тебя особенной. Мы так благодарны за твою дружбу. С 8 марта!",
                image: null,
                song: "songs/zarina.mp3"
            },
            "Гульзада": {
                name: "Гульзада",
                description: "Прекрасная Гульзада! Твоё присутствие дарует нам тепло и свет. Ты вдохновляешь нас каждый день. С праздником Международного дня женщин!",
                image: "https://i.postimg.cc/02fnD6fQ/Whats-App-Image-2026-03-04-at-00-56-14.jpg",
                song: "songs/gulzada.mp3"
            }
        };

        // Also accept "Гулзада" as alternative spelling
        girls["Гулзада"] = girls["Гульзада"];

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkName();
            }
        }

        function checkName() {
            const nameInput = document.getElementById('nameInput').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            
            // Check if name matches (case-insensitive)
            let foundGirl = null;
            for (let girlName in girls) {
                if (girlName.toLowerCase() === nameInput.toLowerCase()) {
                    foundGirl = girls[girlName];
                    break;
                }
            }

            if (foundGirl) {
                errorMessage.style.display = 'none';
                showGirlPage(foundGirl);
            } else {
                errorMessage.style.display = 'block';
            }
        }

        function showGirlPage(girl) {
            // Hide login, show girl page
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('girlPage').style.display = 'block';

            // Update girl info
            document.getElementById('girlName').textContent = girl.name;
            document.getElementById('girlDescription').textContent = girl.description;

            // Update image if exists
            if (girl.image) {
                const img = document.getElementById('girlImage');
                const placeholder = document.getElementById('girlPlaceholder');
                img.src = girl.image;
                img.style.display = 'block';
                img.onload = function() {
                    placeholder.style.display = 'none';
                };
                img.onerror = function() {
                    console.log('Image failed to load: ' + girl.image);
                    placeholder.style.display = 'block';
                };
            }

            // Update and auto-play music
            const audio = document.getElementById('bgMusic');
            audio.src = girl.song;
            audio.currentTime = 0;
            audio.play().catch(function(error) {
                console.log('Auto-play prevented:', error);
            });

            // Scroll to top
            window.scrollTo(0, 0);
        }

        function goBack() {
            document.getElementById('girlPage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('nameInput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
            
            // Stop music
            const audio = document.getElementById('bgMusic');
            audio.pause();
            audio.currentTime = 0;
        }

        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const btn = document.querySelector('.music-control');
            
            if (audio.paused) {
                audio.play();
                btn.innerHTML = '<span id="musicIcon">⏸️</span> Pause Music';
            } else {
                audio.pause();
                btn.innerHTML = '<span id="musicIcon">🎵</span> Play Music';
            }
        }
    </script>
</body>
</html>
